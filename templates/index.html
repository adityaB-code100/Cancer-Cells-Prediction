<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancer Prediction System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .binary-group {
            display: flex;
            gap: 15px;
        }
        .binary-option {
            flex: 1;
            text-align: center;
        }
        .binary-option input[type="radio"] {
            width: auto;
            margin-right: 5px;
        }
        .submit-btn {
            background-color: #3498db;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
        }
        .submit-btn:hover {
            background-color: #2980b9;
        }
        .error {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #f44336;
        }
        .section-title {
            background-color: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
            margin-top: 25px;
            margin-bottom: 15px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cancer Risk Prediction System</h1>
        
        {% if errors %}
            <div class="error">
                <strong>Validation Errors:</strong>
                <ul>
                    {% for error in errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endif %}
        
        <form method="POST" action="/predict">
            <div class="grid-container">
                <!-- Personal Information -->
                <div>
                    <div class="section-title"><strong>Personal Information</strong></div>
                    
                    <div class="form-group">
                        <label for="Gender">Gender:</label>
                        <select name="Gender" id="Gender" required>
                            <option value="">Select Gender</option>
                            <option value="Male" {% if input_data and input_data.Gender == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if input_data and input_data.Gender == 'Female' %}selected{% endif %}>Female</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="Age_Years">Age (Years):</label>
                        <input type="number" name="Age_Years" id="Age_Years" min="10" max="100" placeholder="Enter age in years (10-100)" 
                               value="{% if input_data %}{{ input_data.Age_Years }}{% endif %}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="BMI_Value">BMI Value:</label>
                        <input type="number" name="BMI_Value" id="BMI_Value" min="15" max="40" step="0.1" placeholder="Enter BMI (15-40)"
                               value="{% if input_data %}{{ input_data.BMI_Value }}{% endif %}" required>
                    </div>
                </div>
                
                <!-- Smoking History -->
                <div>
                    <div class="section-title"><strong>Smoking History</strong></div>
                    
                    <div class="form-group">
                        <label for="Smoking_Status">Smoking Status:</label>
                        <select name="Smoking_Status" id="Smoking_Status" required>
                            <option value="">Select Smoking Status</option>
                            <option value="Never" {% if input_data and input_data.Smoking_Status == 'Never' %}selected{% endif %}>Never</option>
                            <option value="Former" {% if input_data and input_data.Smoking_Status == 'Former' %}selected{% endif %}>Former</option>
                            <option value="Current" {% if input_data and input_data.Smoking_Status == 'Current' %}selected{% endif %}>Current</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="Smoking_Intensity">Smoking Intensity:</label>
                        <select name="Smoking_Intensity" id="Smoking_Intensity" required>
                            <option value="">Select Intensity</option>
                            <option value="None" {% if input_data and input_data.Smoking_Intensity == 'None' %}selected{% endif %}>None</option>
                            <option value="Light" {% if input_data and input_data.Smoking_Intensity == 'Light' %}selected{% endif %}>Light</option>
                            <option value="Moderate" {% if input_data and input_data.Smoking_Intensity == 'Moderate' %}selected{% endif %}>Moderate</option>
                            <option value="Heavy" {% if input_data and input_data.Smoking_Intensity == 'Heavy' %}selected{% endif %}>Heavy</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="Smoking_Frequency">Smoking Frequency:</label>
                        <select name="Smoking_Frequency" id="Smoking_Frequency" required>
                            <option value="">Select Frequency</option>
                            <option value="None" {% if input_data and input_data.Smoking_Frequency == 'None' %}selected{% endif %}>None</option>
                            <option value="Occasional" {% if input_data and input_data.Smoking_Frequency == 'Occasional' %}selected{% endif %}>Occasional</option>
                            <option value="Daily" {% if input_data and input_data.Smoking_Frequency == 'Daily' %}selected{% endif %}>Daily</option>
                            <option value="Chain Smoker" {% if input_data and input_data.Smoking_Frequency == 'Chain Smoker' %}selected{% endif %}>Chain Smoker</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="Years_Smoked">Years Smoked:</label>
                        <input type="number" name="Years_Smoked" id="Years_Smoked" min="0" max="40" placeholder="Enter years (0-40)"
                               value="{% if input_data %}{{ input_data.Years_Smoked }}{% endif %}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="Cigarettes_Per_Day">Cigarettes Per Day:</label>
                        <input type="number" name="Cigarettes_Per_Day" id="Cigarettes_Per_Day" min="0" max="40" placeholder="Enter cigarettes (0-40)"
                               value="{% if input_data %}{{ input_data.Cigarettes_Per_Day }}{% endif %}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="Smoking_Risk">Smoking Risk Score:</label>
                        <input type="number" name="Smoking_Risk" id="Smoking_Risk" min="0" step="0.1" placeholder="Calculated automatically"
                               value="{% if input_data %}{{ input_data.Smoking_Risk }}{% endif %}" required>
                    </div>
                </div>
            </div>
            
            <div class="grid-container">
                <!-- Environmental Exposures -->
                <div>
                    <div class="section-title"><strong>Environmental Exposures</strong></div>
                    
                    <div class="form-group">
                        <label for="PM25_Level">PM2.5 Level (μg/m³):</label>
                        <input type="number" name="PM25_Level" id="PM25_Level" min="10" max="300" step="0.1" placeholder="Enter PM2.5 (10-300 μg/m³)"
                               value="{% if input_data %}{{ input_data.PM25_Level }}{% endif %}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="Radon_Level_Bq">Radon Level (Bq/m³):</label>
                        <input type="number" name="Radon_Level_Bq" id="Radon_Level_Bq" min="0" max="150" step="0.1" placeholder="Enter radon (10-150 Bq/m³)"
                               value="{% if input_data %}{{ input_data.Radon_Level_Bq|default('') }}{% endif %}" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="Asbestos_Exposure_Index">Asbestos Exposure Index:</label>
                        <input type="number" name="Asbestos_Exposure_Index" id="Asbestos_Exposure_Index" min="0" max="150" step="0.1" placeholder="Enter asbestos index (10-150)"
                               value="{% if input_data %}{{ input_data.Asbestos_Exposure_Index|default('') }}{% endif %}" required>
                    </div>
                </div>
                
                <!-- Health Symptoms -->
                <div>
                    <div class="section-title"><strong>Health Symptoms</strong></div>
                    
                    <div class="form-group">
                        <label for="Oxygen_Percentage">Oxygen Percentage (%):</label>
                        <input type="number" name="Oxygen_Percentage" id="Oxygen_Percentage" min="80" max="100" step="0.1" placeholder="Enter oxygen % (80-100%)"
                               value="{% if input_data %}{{ input_data.Oxygen_Percentage }}{% endif %}" required>
                    </div>
                    

                    
                    <div class="form-group">
                        <label>Has Cough:</label>
                        <div class="binary-group">
                            <div class="binary-option">
                                <input type="radio" name="Has_Cough" id="Has_Cough_0" value="0" 
                                       {% if input_data and input_data.Has_Cough == 0 %}checked{% endif %} required>
                                <label for="Has_Cough_0">No</label>
                            </div>
                            <div class="binary-option">
                                <input type="radio" name="Has_Cough" id="Has_Cough_1" value="1" 
                                       {% if input_data and input_data.Has_Cough == 1 %}checked{% endif %} required>
                                <label for="Has_Cough_1">Yes</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="Coughing">Coughing Severity:</label>
                        <select name="Coughing" id="Coughing" required>
                            <option value="">Select Coughing Severity</option>
                            <option value="None" {% if input_data and input_data.Coughing == 'None' %}selected{% endif %}>None</option>
                            <option value="Mild" {% if input_data and input_data.Coughing == 'Mild' %}selected{% endif %}>Mild</option>
                            <option value="Moderate" {% if input_data and input_data.Coughing == 'Moderate' %}selected{% endif %}>Moderate</option>
                            <option value="High" {% if input_data and input_data.Coughing == 'High' %}selected{% endif %}>High</option>
                            <option value="Severe" {% if input_data and input_data.Coughing == 'Severe' %}selected{% endif %}>Severe</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Has Breathlessness:</label>
                        <div class="binary-group">
                            <div class="binary-option">
                                <input type="radio" name="Has_Breathlessness" id="Has_Breathlessness_0" value="0" 
                                       {% if input_data and input_data.Has_Breathlessness == 0 %}checked{% endif %} required>
                                <label for="Has_Breathlessness_0">No</label>
                            </div>
                            <div class="binary-option">
                                <input type="radio" name="Has_Breathlessness" id="Has_Breathlessness_1" value="1" 
                                       {% if input_data and input_data.Has_Breathlessness == 1 %}checked{% endif %} required>
                                <label for="Has_Breathlessness_1">Yes</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="Breathlessness">Breathlessness Severity:</label>
                        <select name="Breathlessness" id="Breathlessness" required>
                            <option value="">Select Breathlessness Severity</option>
                            <option value="None" {% if input_data and input_data.Breathlessness == 'None' %}selected{% endif %}>None</option>
                            <option value="Mild" {% if input_data and input_data.Breathlessness == 'Mild' %}selected{% endif %}>Mild</option>
                            <option value="Moderate" {% if input_data and input_data.Breathlessness == 'Moderate' %}selected{% endif %}>Moderate</option>
                            <option value="High" {% if input_data and input_data.Breathlessness == 'High' %}selected{% endif %}>High</option>
                            <option value="Severe" {% if input_data and input_data.Breathlessness == 'Severe' %}selected{% endif %}>Severe</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="submit-btn">Predict Cancer Risk</button>
        </form>
    </div>
    <script>
        function calculateSmokingRisk() {
            const smokingStatus = document.getElementById('Smoking_Status').value;
            
            // If smoking status is Never, set risk to 0
            if (smokingStatus === 'Never') {
                document.getElementById('Smoking_Risk').value = '0.00';
                return;
            }
            
            const yearsSmoked = parseFloat(document.getElementById('Years_Smoked').value) || 0;
            const cigarettesPerDay = parseFloat(document.getElementById('Cigarettes_Per_Day').value) || 0;
            
            // Calculate pack years: (years smoked * cigarettes per day) / 20
            // Then smoking risk = pack years * cigarettes per day
            // Which simplifies to: (years smoked * cigarettes per day^2) / 20
            const packYears = (yearsSmoked * cigarettesPerDay) / 20;
            const smokingRisk = packYears * cigarettesPerDay;
            
            document.getElementById('Smoking_Risk').value = smokingRisk.toFixed(2);
        }
        
        // Add event listeners to update smoking risk when values change
        document.addEventListener('DOMContentLoaded', function() {
            const yearsSmokedInput = document.getElementById('Years_Smoked');
            const cigarettesPerDayInput = document.getElementById('Cigarettes_Per_Day');
            const smokingStatusInput = document.getElementById('Smoking_Status');
            
            yearsSmokedInput.addEventListener('input', calculateSmokingRisk);
            cigarettesPerDayInput.addEventListener('input', calculateSmokingRisk);
            smokingStatusInput.addEventListener('change', calculateSmokingRisk);
            
            // Calculate initial value if fields have values
            calculateSmokingRisk();
        });
    </script>
</body>
</html>
